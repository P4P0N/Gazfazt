<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Escanear QR</title>
    <link rel="stylesheet" href="/PROYECTO_GAZFAZT/assets/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow p-4 text-center" style="max-width:400px; width:100%;">

        <h4 class="mb-3">⛽ Escanear código QR</h4>

        <!-- BOTÓN -->
        <button class="btn btn-primary mb-3" onclick="iniciarEscaner()">
            Iniciar escáner
        </button>

        <!-- CÁMARA -->
        <div id="reader" class="border rounded mb-3" style="width:100%;"></div>

        <!-- RESULTADO -->
        <div id="resultado" class="mt-3"></div>

        <!-- BOTÓN -->
        <button class="btn btn-outline-secondary mt-3" onclick="location.reload()">
            Escanear otro QR
        </button>

    </div>

</div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="/PROYECTO_GAZFAZT/assets/js/scanner.js"></script>

</body>

</html>
