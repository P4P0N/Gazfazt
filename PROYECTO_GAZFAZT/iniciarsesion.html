<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- TU CSS -->
    <link rel="stylesheet" href="resources/css/styles.css">
</head>

<body>

    <div class="container mt-5 d-flex justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">

                <!-- HEADER -->
                <div class="card-header fs-4 py-4 text-center header-formulario">
                    Inicia sesión en Gazfazt
                </div>

                <div class="card-body p-4">

                    <form>

                        <!-- CORREO -->
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="correo" placeholder="name@example.com"
                                required>
                            <label for="correo">Correo electrónico</label>
                        </div>

                        <!-- CONTRASEÑA -->
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" placeholder="Password" required>
                            <label for="password">Contraseña</label>
                        </div>

                        <!-- BOTON -->
                        <button type="button" class="btn btn-gazfazt w-100" id="btnLogin">
                            Iniciar sesión
                        </button>

                    </form>

                    <!-- MENSAJE CREAR CUENTA -->
                    <div class="text-center mt-4">
                        <p class="mb-0">
                            ¿No tienes cuenta?
                            <a href="/PROYECTO_GAZFAZT/login.html" class="text-decoration-none fw-bold"
                                style="color:#4A4696;">
                                Crea una aquí
                            </a>
                        </p>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- SCRIPT -->
    <script>
        document.getElementById("btnLogin").addEventListener("click", function () {

            const correo = document.getElementById("correo").value;
            const password = document.getElementById("password").value;

            fetch("http://localhost:3000/usuarios")
                .then(res => res.json())
                .then(data => {

                    const usuario = data.find(u =>
                        u.correo === correo && u.password === password
                    );

                    if (usuario) {
                        alert("Bienvenido " + usuario.nombre);

                        // guardar sesión (opcional)
                        localStorage.setItem("usuario", JSON.stringify(usuario));
                        
                        window.location.href = "/PROYECTO_GAZFAZT/indexUsuario.html";
                    } else {
                        alert("Correo o contraseña incorrectos");
                    }

                });

        });
    </script>

</body>

</html>
