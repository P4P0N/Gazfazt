<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cuenta</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="/PROYECTO_GAZFAZT/assets/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/PROYECTO_GAZFAZT/resources/css/styles.css">

    <style>
        .navbar {
            background-color: #4A4696;
        }
    </style>

</head>

<body>
    <header>
        <nav class="navbar navbar-expand-md navbar-dark fixed-top ">
            <div class="container-fluid ">

                <!-- Logo -->
                <a class="navbar-brand d-flex align-items-center " href="/PROYECTO_GAZFAZT/indexUsuario.html">
                    <img src="/PROYECTO_GAZFAZT/resources/images/logo.jpeg" alt="GazFazt" width="70" height="60"
                        class="me-2 ">
                </a>
            </div>
        </nav>


    </header>

    <div class="container mt-5 ">

        <!-- Logo -->
        <div class="text-center mb-4 margin-top">

            <h3 class="mt-3 ">Información de la Cuenta</h3>
        </div>

        <div class="card shadow p-4 ">

            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Placa</label>
                    <input type="text" class="form-control" id="placa" readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Número documento</label>
                    <input type="text" class="form-control" id="documento" readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Celular</label>
                    <input type="text" class="form-control" id="numero" readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Correo electrónico</label>
                    <input type="text" class="form-control" id="correo" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Departamento</label>
                    <input type="text" class="form-control" id="departamento" readonly>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Municipio</label>
                    <input type="text" class="form-control" id="municipio" readonly>
                </div>

                <div class="col-md-6 esppacios">
                    <label class="form-label">Dirección</label>
                    <input type="text" class="form-control" id="direccion" readonly>
                </div>

                <div class="d-flex justify-content-center gap-3 mt-4">

                    <a href="./indexUsuario.html" class="btn btn-outline-primary btn-blue">
                        Regresar
                    </a>

                    <a href="./index.html" class="btn btn-danger">
                        Cerrar sesión
                    </a>

                </div>




            </div>

        </div>

    </div>
    <script>
        const usuario = JSON.parse(localStorage.getItem("usuario"));

        if (usuario) {
            document.getElementById("nombre").value = usuario.nombre + " " + usuario.apellido;
            document.getElementById("correo").value = usuario.correo;
            document.getElementById("direccion").value = usuario.direccion;
            document.getElementById("documento").value = usuario.documento;
            document.getElementById("departamento").value = usuario.departamento;
            document.getElementById("municipio").value = usuario.municipio;
        }
    </script>
</body>

</html>
